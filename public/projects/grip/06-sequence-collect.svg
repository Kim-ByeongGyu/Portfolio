<svg width="1000" height="520" viewBox="0 0 1000 520" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif, system-ui, 'Malgun Gothic', sans-serif">
  <rect width="1000" height="520" fill="#ffffff"/>
  <text x="40" y="44" font-size="23" font-weight="700" fill="#0f172a">시퀀스 · 지도 조회 API 연동</text>
  <text x="40" y="70" font-size="14" fill="#64748b">브라우저 지도 화면 → Spring Boot API → MySQL 조회 → Naver Maps Marker / InfoWindow 표시</text>

  <defs>
    <marker id="s-ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#475569" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <g font-size="15" font-weight="700" fill="#0f172a" text-anchor="middle">
    <rect x="50" y="92" width="180" height="42" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
    <text x="140" y="118">mainMap.js</text>
    <rect x="295" y="92" width="210" height="42" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
    <text x="400" y="118">MapRestController</text>
    <rect x="565" y="92" width="190" height="42" rx="8" fill="#f5f3ff" stroke="#7c3aed" stroke-width="1.5"/>
    <text x="660" y="118">ClimingGymService</text>
    <rect x="810" y="92" width="150" height="42" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5"/>
    <text x="885" y="118">MySQL</text>
  </g>

  <g stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="4 5">
    <line x1="140" y1="134" x2="140" y2="490"/>
    <line x1="400" y1="134" x2="400" y2="490"/>
    <line x1="660" y1="134" x2="660" y2="490"/>
    <line x1="885" y1="134" x2="885" y2="490"/>
  </g>

  <g font-size="13.5" fill="#334155" text-anchor="middle">
    <text x="270" y="174">GET /api/climbinggyms</text>
    <line x1="140" y1="184" x2="398" y2="184" stroke="#475569" stroke-width="1.8" marker-end="url(#s-ah)"/>

    <text x="530" y="226">getAllClimbingGyms()</text>
    <line x1="400" y1="236" x2="658" y2="236" stroke="#475569" stroke-width="1.8" marker-end="url(#s-ah)"/>

    <text x="772" y="278">findAll()</text>
    <line x1="660" y1="288" x2="883" y2="288" stroke="#475569" stroke-width="1.8" marker-end="url(#s-ah)"/>

    <text x="772" y="330">ClimbingGym 목록 반환</text>
    <line x1="885" y1="340" x2="662" y2="340" stroke="#16a34a" stroke-width="1.6" stroke-dasharray="6 4" marker-end="url(#s-ah)"/>

    <text x="530" y="382">DTO 변환: id·name·address·mapX·mapY·acceptableCount</text>
    <line x1="660" y1="392" x2="402" y2="392" stroke="#7c3aed" stroke-width="1.6" stroke-dasharray="6 4" marker-end="url(#s-ah)"/>

    <text x="270" y="438">JSON 응답</text>
    <line x1="400" y1="448" x2="142" y2="448" stroke="#2563eb" stroke-width="1.6" stroke-dasharray="6 4" marker-end="url(#s-ah)"/>
  </g>

  <rect x="72" y="462" width="260" height="36" rx="8" fill="#ecfeff" stroke="#06b6d4" stroke-width="1.2"/>
  <text x="202" y="485" font-size="13.5" font-weight="700" fill="#0e7490" text-anchor="middle">Marker / InfoWindow / 상세 이동 표시</text>
</svg>
