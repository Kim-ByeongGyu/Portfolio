<svg width="1000" height="560" viewBox="0 0 1000 560" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif, system-ui, 'Malgun Gothic', sans-serif">
  <rect width="1000" height="560" fill="#ffffff"/>
  <text x="40" y="48" font-size="24" font-weight="700" fill="#0f172a">GRIP · 시스템 / AWS 구성</text>
  <text x="40" y="74" font-size="15" fill="#64748b">사용자 → EC2(Spring Boot) → RDS · Redis · S3, 외부 Naver 지역검색 API</text>

  <!-- Client -->
  <rect x="40" y="250" width="170" height="90" rx="12" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="125" y="290" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a">사용자</text>
  <text x="125" y="314" text-anchor="middle" font-size="14" fill="#64748b">브라우저</text>

  <!-- EC2 -->
  <rect x="300" y="220" width="280" height="150" rx="14" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <text x="440" y="258" text-anchor="middle" font-size="19" font-weight="700" fill="#1e3a8a">AWS EC2</text>
  <text x="440" y="284" text-anchor="middle" font-size="14" fill="#1e40af">Spring Boot · Spring Security</text>
  <text x="440" y="306" text-anchor="middle" font-size="14" fill="#1e40af">JWT 인증 (STATELESS)</text>
  <text x="440" y="328" text-anchor="middle" font-size="14" fill="#1e40af">JPA · Thymeleaf</text>
  <text x="440" y="350" text-anchor="middle" font-size="14" fill="#1e40af">Kakao OAuth2 로그인</text>

  <!-- Data stores -->
  <rect x="700" y="110" width="260" height="80" rx="12" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5"/>
  <text x="720" y="146" font-size="17" font-weight="700" fill="#166534">AWS RDS · MySQL</text>
  <text x="720" y="170" font-size="13.5" fill="#15803d">회원 · 게시글 · 클라이밍장 · 좋아요</text>

  <rect x="700" y="235" width="260" height="80" rx="12" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="720" y="271" font-size="17" font-weight="700" fill="#991b1b">Redis</text>
  <text x="720" y="295" font-size="13.5" fill="#b91c1c">RefreshToken 저장 (TTL 7일)</text>

  <rect x="700" y="360" width="260" height="80" rx="12" fill="#fffbeb" stroke="#d97706" stroke-width="1.5"/>
  <text x="720" y="396" font-size="17" font-weight="700" fill="#92400e">AWS S3</text>
  <text x="720" y="420" font-size="13.5" fill="#b45309">프로필 · 게시글 이미지 업로드</text>

  <!-- Naver API -->
  <rect x="300" y="430" width="280" height="80" rx="12" fill="#f5f3ff" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="440" y="466" text-anchor="middle" font-size="17" font-weight="700" fill="#5b21b6">Naver 지역검색 API</text>
  <text x="440" y="490" text-anchor="middle" font-size="13.5" fill="#6d28d9">클라이밍장 약 100곳 데이터 수집</text>

  <!-- Arrows -->
  <defs>
    <marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#94a3b8" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <line x1="210" y1="295" x2="298" y2="295" stroke="#94a3b8" stroke-width="2" marker-end="url(#ah)"/>
  <line x1="580" y1="280" x2="698" y2="160" stroke="#94a3b8" stroke-width="2" marker-end="url(#ah)"/>
  <line x1="580" y1="295" x2="698" y2="275" stroke="#94a3b8" stroke-width="2" marker-end="url(#ah)"/>
  <line x1="580" y1="310" x2="698" y2="395" stroke="#94a3b8" stroke-width="2" marker-end="url(#ah)"/>
  <line x1="440" y1="370" x2="440" y2="428" stroke="#94a3b8" stroke-width="2" marker-end="url(#ah)"/>
</svg>
